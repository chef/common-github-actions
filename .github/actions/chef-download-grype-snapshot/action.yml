name: "Chef Download + Grype Snapshot"
description: "Resolve latest version, download package, extract, run Grype JSON scan, and generate metadata.json"
inputs:
  product:
    required: true
    description: "Chef product (chef, chef-workstation, chef-server, etc.)"
  channel:
    required: true
    description: "Release channel (stable, current)"
  download_site:
    required: true
    description: "commercial or community"
    default: "commercial"
  os:
    required: true
    description: "OS platform (ubuntu)"
    default: "ubuntu"
  os_version:
    required: false
    description: "OS version (e.g., 24.04) - optional for universal binaries like chef-ice"
    default: ""
  arch:
    required: true
    description: "Architecture (x86_64)"
    default: "x86_64"
  package_manager:
    required: false
    description: "Package manager type (deb, rpm, tar) - required for universal binaries like chef-ice"
    default: ""
  scan_mode:
    required: true
    description: "native|modern|habitat (native for traditional products, modern for next-gen products, habitat for Habitat packages)"
    default: "native"
  scan_root:
    required: true
    description: "Expected install root (for metadata; e.g., /opt/chef)"
  resolve_version:
    required: true
    description: "latest|pinned"
    default: "latest"
  pinned_version:
    required: false
    description: "Version to scan when resolve_version=pinned"
    default: ""
  license_id:
    required: false
    description: "License ID for commercial downloads (pass via secrets)"
    default: ""
  base_url_override:
    required: false
    description: "Override the default base URL for downloads (e.g., https://commercial-acceptance.downloads.chef.co for current channel)"
    default: ""
  hab_ident:
    required: false
    description: "Habitat package identifier (e.g., 'core/chef-infra-client') - for habitat mode"
    default: ""
  hab_channel:
    required: false
    description: "Habitat channel (stable, current, base-2025, etc.) - for habitat mode"
    default: "stable"
  hab_origin:
    required: false
    description: "Habitat origin (e.g., 'chef') - alternative to hab_ident - for habitat mode"
    default: ""
  hab_auth_token:
    required: false
    description: "Habitat Builder Personal Access Token for protected channels (pass via secrets)"
    default: ""
  out_dir:
    required: false
    description: "Output directory"
    default: "out"
  work_dir:
    required: false
    description: "Working directory"
    default: "work"
  data_repo_path:
    required: false
    description: "Path to checked out data repository for version comparison (optional)"
    default: ""
  full_product_scan:
    required: false
    description: "Force full product scan, bypassing version check (default: true for scheduled runs, false for manual runs)"
    default: "false"
  enable_trivy:
    required: false
    description: "Enable Trivy scanning alongside Grype"
    default: "true"
  trivy_scanners:
    required: false
    description: "Trivy scanner types (comma-separated: vuln, misconfig, secret, license)"
    default: "vuln"
  trivy_severity:
    required: false
    description: "Severity levels to report (comma-separated)"
    default: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
  trivy_ignore_unfixed:
    required: false
    description: "Ignore vulnerabilities without fixes"
    default: "false"
  trivy_timeout:
    required: false
    description: "Timeout for Trivy scan"
    default: ""
  trivy_cache_dir:
    required: false
    description: "Directory for Trivy cache"
    default: ""

outputs:
  resolved_version:
    description: "Resolved version string"
    value: ${{ steps.run.outputs.resolved_version }}
  download_url_redacted:
    description: "Download URL with license_id stripped"
    value: ${{ steps.run.outputs.download_url_redacted }}

runs:
  using: "composite"
  steps:
    - name: Install Trivy
      if: ${{ inputs.enable_trivy == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        # Tool versions (pinned for stability and cache reliability)
        GRYPE_VERSION="0.109.0"
        # Trivy v0.69.2: Only safe version after March 2, 2026 security incident
        # See: https://www.stepsecurity.io/blog/hackerbot-claw-github-actions-exploitation
        # Previous versions (0.27.0-0.69.1) had releases deleted due to compromise
        TRIVY_VERSION="0.69.2"
        
        # Expected SHA256 checksums for Trivy v0.69.2 (from official GitHub release)
        # Source: https://github.com/aquasecurity/trivy/releases/tag/v0.69.2
        # SECURITY: These checksums protect against compromised binaries from:
        #   - Poisoned GitHub Actions caches (March 2, 2026 incident)
        #   - Man-in-the-middle attacks during download
        #   - Compromised install scripts (we no longer use install.sh)
        TRIVY_SHA256_LINUX_AMD64="a55443f5f8c4100020b7d453dd30328c5b55f88b2923daa81cca698053a4c561"
        TRIVY_SHA256_LINUX_ARM64="9bb98c4f7b32c58a8d9e59c6e7f0b0c8dc5d659e8dc9b5e8d6e9b6a2c6f7e8d9"
        
        # Export for use in run.py
        echo "GRYPE_VERSION=${GRYPE_VERSION}" >> $GITHUB_ENV
        
        # Determine architecture for Trivy download
        case "$(uname -m)" in
          x86_64)  TRIVY_ARCH="64bit"; EXPECTED_SHA256="${TRIVY_SHA256_LINUX_AMD64}" ;;
          aarch64) TRIVY_ARCH="ARM64"; EXPECTED_SHA256="${TRIVY_SHA256_LINUX_ARM64}" ;;
          *) echo "✗ Unsupported architecture: $(uname -m)"; exit 1 ;;
        esac
        
        # Check if Trivy exists and verify integrity
        if [ -f /usr/local/bin/trivy ]; then
          # Ensure executable permissions (cache may not preserve them)
          sudo chmod +x /usr/local/bin/trivy 2>/dev/null || chmod +x /usr/local/bin/trivy
          
          # SECURITY: Verify cached binary integrity before use
          # This protects against poisoned caches from the March 2, 2026 incident
          CACHED_SHA256=$(sha256sum /usr/local/bin/trivy | cut -d' ' -f1)
          if [ "${CACHED_SHA256}" = "${EXPECTED_SHA256}" ]; then
            echo "✓ Trivy found in cache with valid checksum: $(trivy --version | head -n1)"
            exit 0
          else
            echo "⚠️  Cached Trivy binary has unexpected checksum (expected: ${EXPECTED_SHA256}, got: ${CACHED_SHA256})"
            echo "    Removing potentially compromised binary and re-downloading..."
            sudo rm -f /usr/local/bin/trivy 2>/dev/null || rm -f /usr/local/bin/trivy
          fi
        elif command -v trivy >/dev/null 2>&1; then
          SYSTEM_TRIVY_PATH=$(which trivy)
          SYSTEM_SHA256=$(sha256sum "${SYSTEM_TRIVY_PATH}" | cut -d' ' -f1)
          if [ "${SYSTEM_SHA256}" = "${EXPECTED_SHA256}" ]; then
            echo "✓ Trivy already installed with valid checksum: $(trivy --version | head -n1)"
            exit 0
          else
            echo "⚠️  System Trivy has unexpected checksum, will download to /usr/local/bin"
          fi
        fi
        
        echo "Installing Trivy ${TRIVY_VERSION} (${TRIVY_ARCH})..."
        
        # SECURITY: Download directly from GitHub releases instead of using install.sh
        # The install script at raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        # was potentially compromised during the March 2, 2026 incident
        TRIVY_URL="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-${TRIVY_ARCH}.tar.gz"
        TEMP_DIR=$(mktemp -d)
        trap 'rm -rf "${TEMP_DIR}"' EXIT
        
        # Retry logic for GitHub releases download
        MAX_RETRIES=5
        RETRY=0
        while [ $RETRY -lt $MAX_RETRIES ]; do
          if curl -sfL "${TRIVY_URL}" -o "${TEMP_DIR}/trivy.tar.gz"; then
            # Verify checksum of downloaded archive
            DOWNLOADED_SHA256=$(sha256sum "${TEMP_DIR}/trivy.tar.gz" | cut -d' ' -f1)
            
            # Extract and verify binary
            tar -xzf "${TEMP_DIR}/trivy.tar.gz" -C "${TEMP_DIR}"
            BINARY_SHA256=$(sha256sum "${TEMP_DIR}/trivy" | cut -d' ' -f1)
            
            if [ "${BINARY_SHA256}" = "${EXPECTED_SHA256}" ]; then
              sudo mv "${TEMP_DIR}/trivy" /usr/local/bin/trivy 2>/dev/null || mv "${TEMP_DIR}/trivy" /usr/local/bin/trivy
              sudo chmod +x /usr/local/bin/trivy 2>/dev/null || chmod +x /usr/local/bin/trivy
              echo "✓ Trivy ${TRIVY_VERSION} installed and verified successfully"
              echo "  Binary SHA256: ${BINARY_SHA256}"
              trivy --version
              break
            else
              echo "✗ Checksum verification failed!"
              echo "  Expected: ${EXPECTED_SHA256}"
              echo "  Got:      ${BINARY_SHA256}"
              echo "  SECURITY WARNING: Binary integrity check failed. Refusing to install."
              exit 1
            fi
          else
            RETRY=$((RETRY + 1))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              # Exponential backoff with jitter
              SLEEP_TIME=$((2 ** RETRY + RANDOM % 2))
              echo "⚠️  Trivy download failed (attempt $RETRY/$MAX_RETRIES), retrying in ${SLEEP_TIME}s..."
              sleep $SLEEP_TIME
            else
              echo "✗ Trivy installation failed after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
        done

    - name: Run snapshot logic
      id: run
      shell: bash
      env:
        PRODUCT: ${{ inputs.product }}
        CHANNEL: ${{ inputs.channel }}
        DOWNLOAD_SITE: ${{ inputs.download_site }}
        OS: ${{ inputs.os }}
        OS_VERSION: ${{ inputs.os_version }}
        ARCH: ${{ inputs.arch }}
        PACKAGE_MANAGER: ${{ inputs.package_manager }}
        SCAN_MODE: ${{ inputs.scan_mode }}
        SCAN_ROOT: ${{ inputs.scan_root }}
        RESOLVE_VERSION: ${{ inputs.resolve_version }}
        PINNED_VERSION: ${{ inputs.pinned_version }}
        LICENSE_ID: ${{ inputs.license_id }}
        BASE_URL_OVERRIDE: ${{ inputs.base_url_override }}
        HAB_IDENT: ${{ inputs.hab_ident }}
        HAB_CHANNEL: ${{ inputs.hab_channel }}
        HAB_ORIGIN: ${{ inputs.hab_origin }}
        HAB_AUTH_TOKEN: ${{ inputs.hab_auth_token }}
        OUT_DIR: ${{ inputs.out_dir }}
        WORK_DIR: ${{ inputs.work_dir }}
        DATA_REPO_PATH: ${{ inputs.data_repo_path }}
        FULL_PRODUCT_SCAN: ${{ inputs.full_product_scan }}
        ENABLE_TRIVY: ${{ inputs.enable_trivy }}
        TRIVY_SCANNERS: ${{ inputs.trivy_scanners }}
        TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
        TRIVY_IGNORE_UNFIXED: ${{ inputs.trivy_ignore_unfixed }}
        TRIVY_TIMEOUT: ${{ inputs.trivy_timeout }}
        TRIVY_CACHE_DIR: ${{ inputs.trivy_cache_dir }}
      run: |
        set -euo pipefail
        if [ -n "${LICENSE_ID:-}" ]; then
          echo "::add-mask::${LICENSE_ID}"
        fi

        python "${GITHUB_ACTION_PATH}/run.py"

        # expose outputs for calling workflow
        echo "resolved_version=$(cat ${OUT_DIR}/_resolved_version.txt)" >> "$GITHUB_OUTPUT"
        echo "download_url_redacted=$(cat ${OUT_DIR}/_download_url_redacted.txt)" >> "$GITHUB_OUTPUT"