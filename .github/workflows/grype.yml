# grype.yml
# Grype security scan for source code vulnerabilities
# https://github.com/anchore/grype

name: Grype security scan

on:
  workflow_call:
    inputs:
      fail-grype-on-high:
        description: 'Fail the pipeline if Grype finds HIGH vulnerabilities'
        required: false
        type: boolean
        default: false
      fail-grype-on-critical:
        description: 'Fail the pipeline if Grype finds CRITICAL vulnerabilities'
        required: false
        type: boolean
        default: false
      grype-image-skip-aws:
        description: 'Skip Grype image scan on AWS ECR images to avoid rate limits (assumes these images are scanned with Amazon ECR scan or Trivy)'
        required: false
        type: boolean
        default: false
      prebuilt-image-artifact:
        description: 'Name of uploaded artifact containing a Docker image tar (skip Docker build if provided)'
        required: false
        type: string
        default: ''
      prebuilt-image-names:
        description: 'Space-separated list of Docker image:tag names inside the prebuilt artifact tar'
        required: false
        type: string
        default: ''

jobs:
  grype-scan:
    name: Grype vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Configure git for private
        env:
          GOPRIVATE: ${{ inputs.go-private-modules }}
        run: git config --global url."https://${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Grype
        run: |
          curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin

      - name: Generate Artifact Name
        run: |
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            ARTIFACT_NAME=$(echo "grype-scan-${{ github.event.repository.name }}-${TIMESTAMP}" | sed 's|/|-|g')
            echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        if: ${{ !inputs.grype-image-skip-aws }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        if: ${{ !inputs.grype-image-skip-aws }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download prebuilt Docker image
        if: ${{ inputs.prebuilt-image-artifact != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.prebuilt-image-artifact }}
          path: /tmp

      - name: Load prebuilt Docker image
        id: load-image
        if: ${{ inputs.prebuilt-image-artifact != '' }}
        run: |
          echo "Loading prebuilt images from artifact..."
          docker load -i /tmp/docker-image.tar
          echo "IMAGES=${{ inputs.prebuilt-image-names }}" >> "$GITHUB_OUTPUT"
          echo "Loaded images: ${{ inputs.prebuilt-image-names }}"
          docker images

      - name: Build Docker image
        id: build-image
        if: ${{ inputs.prebuilt-image-artifact == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # WARNING: This workflow accesses a non-default secret. Ensure this secret is
          # required and that it is stored securely in the repository or organization settings.
          NPM_AZURE_KEY: ${{ secrets.NPM_AZURE_KEY }}
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "❌ No Dockerfile found - this workflow requires a Dockerfile to scan Docker image"
            exit 1
          fi
          
          echo "Building Docker image..."
          REPO_NAME=$(basename $(pwd))
          
          # Strategy 0: platform-ui - build with NPM Azure Key via buildx secret
          if [ "${{ github.event.repository.name }}" = "platform-ui" ]; then
            echo "Detected platform-ui - building with NPM Azure Key secret"
            trap 'rm -f .npmrc.tmp' EXIT
            printf '%s' "$NPM_AZURE_KEY" > .npmrc.tmp
            docker buildx create --use
            docker buildx build \
              --secret id=npmrc,src=.npmrc.tmp \
              --load \
              --platform linux/amd64 \
              --build-arg GITHUB_TOKEN="$GITHUB_TOKEN" \
              --build-arg GIT_SHA="${{ github.sha }}" \
              --build-arg APP_VERSION="${{ github.ref_name }}" \
              --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -t "${REPO_NAME}:latest" .
            IMAGES="${REPO_NAME}:latest"

          # Strategy 1: Check for build-docker.sh script (e.g., dsm-erchef)
          elif [ -f "build-docker.sh" ]; then
            echo "Found build-docker.sh script - using it to build images"
            chmod +x build-docker.sh
            GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" ./build-docker.sh
            
            # Detect all images built (typically repo name or repo-name-init)
            IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "^${REPO_NAME}" | grep -v "^<none>")
            
            if [ -z "$IMAGES" ]; then
              echo "⚠️ No images found with prefix ${REPO_NAME} after build-docker.sh"
              echo "Checking for any recently built images..."
              IMAGES=$(docker images --format "{{.CreatedAt}}\t{{.Repository}}:{{.Tag}}" | sort -r | head -5 | cut -f2 | grep -v "^<none>")
            fi
          # Strategy 2: Check for Makefile with compose-build target (e.g., chef-platform-user-accounts-service)
          elif [ -f "Makefile" ] && grep -q "^compose-build:" Makefile; then
            echo "Using Makefile compose-build target with GITHUB_TOKEN"
            export GITHUB_TOKEN="${{ secrets.GH_TOKEN }}"
            make compose-build
            
            echo "Detecting built images..."
            # Get all image names from compose, then keep only ones that exist locally (i.e., were actually built)
            IMAGES=""
            for img in $(docker compose config --images 2>/dev/null | sort -u); do
              TAG_IMG=$(echo "$img" | grep -q ':' && echo "$img" || echo "${img}:latest")
              if docker image inspect "$TAG_IMG" &>/dev/null; then
                IMAGES="${IMAGES}${TAG_IMG} "
              fi
            done
            IMAGES=$(echo "$IMAGES" | xargs)
            
            if [ -z "$IMAGES" ]; then
              echo "⚠️ Could not detect built images from compose config, falling back to repo name match"
              IMAGES=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^${REPO_NAME}" | grep -v "^<none>")
            fi
          # Strategy 3: Fallback to standard docker build
          else
            echo "Using standard docker build with GITHUB_TOKEN build arg"
            docker build --build-arg GITHUB_TOKEN="${{ secrets.GH_TOKEN }}" -t "${REPO_NAME}:latest" .
            IMAGES="${REPO_NAME}:latest"
          fi
          
          if [ -z "$IMAGES" ]; then
            echo "❌ No Docker images found after build"
            exit 1
          fi
          
          echo "IMAGES=$(echo $IMAGES | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "Found images: $IMAGES"

      - name: Determine scan targets
        id: scan-target
        run: |
          IMAGES="${{ steps.load-image.outputs.IMAGES || steps.build-image.outputs.IMAGES }}"
          if [ -z "$IMAGES" ]; then
            echo "❌ No images available to scan"
            exit 1
          fi
          echo "IMAGES=$IMAGES" >> "$GITHUB_OUTPUT"
          echo "Scan targets: $IMAGES"

      - name: Scan with Grype
        id: grype-scan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          SCAN_NAME="${{ github.repository }}"
          IMAGES="${{ steps.scan-target.outputs.IMAGES }}"
          
          echo "Found images to scan:"
          echo "$IMAGES"
          
          # Scan all images and combine results into single files
          > grype-scan.json  # Initialize empty JSON file
          > grype-scan.log   # Initialize empty log file
          
          for IMAGE_NAME in $IMAGES; do
            echo ""
            echo "Scanning Docker image: $IMAGE_NAME"
            grype "$IMAGE_NAME" --name "$SCAN_NAME-$(basename $IMAGE_NAME)" --only-fixed --output json >> grype-scan.json
            grype "$IMAGE_NAME" --name "$SCAN_NAME-$(basename $IMAGE_NAME)" --only-fixed --output table >> grype-scan.log || true
          done

      - name: Check Grype results and fail if vulnerabilities found
        if: ${{ always() && (inputs.fail-grype-on-high == true || inputs.fail-grype-on-critical == true) }}
        run: |
          JSON_FILE="grype-scan.json"
          
          if [ ! -f "$JSON_FILE" ]; then
            echo "⚠️  Grype JSON output not found"
            exit 0
          fi
          
          # Extract vulnerability counts by severity from multiple JSON documents
          # Use jq -s to slurp, deduplicate by CVE+package+version, then count
          CRITICAL_COUNT=$(jq -s '[.[] | .matches[]? | select(.vulnerability.severity == "Critical")] | unique_by(.vulnerability.id + .artifact.name + .artifact.version) | length' "$JSON_FILE" 2>/dev/null || echo "0")
          HIGH_COUNT=$(jq -s '[.[] | .matches[]? | select(.vulnerability.severity == "High")] | unique_by(.vulnerability.id + .artifact.name + .artifact.version) | length' "$JSON_FILE" 2>/dev/null || echo "0")
          
          echo ""
          echo "============================================"
          echo "Grype Security Scan Summary"
          echo "============================================"
          echo "CRITICAL vulnerabilities: $CRITICAL_COUNT"
          echo "HIGH vulnerabilities: $HIGH_COUNT"
          echo "============================================"
          
          VIOLATIONS=""
          [ "${{ inputs.fail-grype-on-critical }}" == "true" ] && [ "$CRITICAL_COUNT" -gt 0 ] && VIOLATIONS="${VIOLATIONS}$CRITICAL_COUNT CRITICAL, "
          [ "${{ inputs.fail-grype-on-high }}" == "true" ] && [ "$HIGH_COUNT" -gt 0 ] && VIOLATIONS="${VIOLATIONS}$HIGH_COUNT HIGH, "
          
          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "❌ BUILD FAILED: Found ${VIOLATIONS%, }"
            exit 1
          else
            echo ""
            echo "✅ No policy-violating vulnerabilities found"
          fi

      - name: Upload Grype scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            grype-scan.json
            grype-scan.log
